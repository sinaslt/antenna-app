
<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Antenos Reguliavimas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; background: #222; }
        #ui { 
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 1000; background: rgba(0,0,0,0.9); color: white; 
            padding: 10px 5px 35px 5px; border-radius: 20px 20px 0 0;
            text-align: center;
        }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; padding: 0 10px; }
        input { 
            width: 100%; height: 45px; font-size: 18px; text-align: center; 
            background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold;
        }
        .btn-draw { width: 90%; height: 50px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; }
        #status { font-size: 12px; margin-top: 10px; color: #00ff00; }
        .label-tag { color: #fff; font-weight: bold; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 4px; font-size: 12px; border: 1px solid white; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="grid">
            <input type="number" id="az1" value="0">
            <input type="number" id="az2" value="90">
            <input type="number" id="az3" value="180">
            <input type="number" id="az4" value="270">
        </div>
        <button class="btn-draw" onclick="drawSectors()">ATNAUJINTI ŽEMĖLAPĮ</button>
        <div id="status">Bakstelėkite ant stogo</div>
    </div>
    <div id="map"></div>

    <script>
        var centerPos = [54.6872, 25.2797];
        var map = L.map('map', { zoomControl: false }).setView(centerPos, 18);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19, attribution: 'Esri'
        }).addTo(map);

        var myLocationMarker = L.circleMarker([0,0], {radius: 8, color: 'white', weight: 2, fillColor: '#007bff', fillOpacity: 1}).addTo(map);
        var antennaMarker = L.circleMarker(centerPos, {radius: 6, color: '#ff3b3b', weight: 3}).addTo(map);
        var layerGroup = L.layerGroup().addTo(map);

        function drawSectors() {
            layerGroup.clearLayers();
            var colors = ['#ff3b3b', '#3bff3b', '#3bffff', '#ffff3b'];
            for (var i = 1; i <= 4; i++) {
                var az = parseFloat(document.getElementById('az' + i).value);
                if (isNaN(az)) continue;
                var angle = (90 - az) * Math.PI / 180;
                var endLat = centerPos[0] + (0.0006 * Math.sin(angle));
                var endLon = centerPos[1] + (0.0009 * Math.cos(angle));
                L.polyline([centerPos, [endLat, endLon]], {color: colors[i-1], weight: 6}).addTo(layerGroup);
            }
        }

        map.on('click', function(e) {
            centerPos = [e.latlng.lat, e.latlng.lng];
            antennaMarker.setLatLng(e.latlng);
            drawSectors();
            document.getElementById('status').innerText = "VIETA NUSTATYTA";
        });

        navigator.geolocation.watchPosition(function(p) {
            myLocationMarker.setLatLng([p.coords.latitude, p.coords.longitude]);
        }, null, {enableHighAccuracy: true});

        drawSectors();
    </script>
</body>
</html>
