https://github.com/sinaslt<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>BS Montuotojas PRO v4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* Naudojame min-height: 100% kad geriau veiktų mobiliose narsyklese */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: #121212;
    overflow: hidden;
}

body {
    display: flex;
    flex-direction: column;
    font-family: sans-serif;
    color: #e0e0e0;
}

/* Zemelapis uzima 65% arba tiek kiek lieka */
#map {
    height: 65vh; 
    width: 100%;
    flex-shrink: 0;
}

/* UI dalis, kuri gali scrollinti jei netelpa */
#ui {
    flex-grow: 1;
    overflow-y: auto;
    padding: 10px 10px 40px 10px; /* Daugiau vietos apacioje del banerio */
    background: #1e1e1e;
    border-top: 3px solid #007bff;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
}

.compass-box {
    background: #2c2c2c;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 8px;
    border: 1px solid #444;
    position: relative;
}

.val {
    font-size: 1.8em;
    font-weight: bold;
    display: block;
}

.az-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
}

input {
    background: #1e1e1e;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 1.1em;
    font-weight: bold;
    text-align: center;
    width: 100%;
    box-sizing: border-box;
    border: 3px solid #555;
}

#az1 { border-color: #ff4444; }
#az2 { border-color: #44ff44; }
#az3 { border-color: #4444ff; }
#az4 { border-color: #ffff44; }

.btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
}

button {
    border: none;
    color: white;
    padding: 12px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 0.9em;
    cursor: pointer;
}

.btn-draw { background: #28a745; grid-column: span 2; }
.btn-mode { background: #f39c12; }
.btn-map { background: #6c757d; }

.status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    position: absolute;
    top: 10px;
    right: 10px;
    border: 2px solid #121212;
}

.gps-active { box-shadow: 0 0 10px #00ff00; background: #00ff00; }

.mode-label {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 0.7em;
    color: #f39c12;
    font-weight: bold;
}

/* Pataisytas baneris */
.bottom-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 30px;
    background: #000;
    color: #007bff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8em;
    font-weight: bold;
    letter-spacing: 1px;
    z-index: 9999;
    border-top: 1px solid #333;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">
    <div class="compass-box">
        <div id="mode-text" class="mode-label">GPS REŽIMAS</div>
        <div id="gps-status" class="status-dot"></div>
        <div style="font-size:0.75em;color:#aaa;">TELEFONO KRYPTIS</div>
        <span id="current-deg" class="val">0°</span>
    </div>

    <div class="az-inputs">
        <input type="number" id="az1" placeholder="a">
        <input type="number" id="az2" placeholder="b">
        <input type="number" id="az3" placeholder="c">
        <input type="number" id="az4" placeholder="d">
    </div>

    <div class="btns">
        <button class="btn-draw" onclick="updateSectors()">BRAIŽYTI SEKTORIUS</button>
        <button id="mode-btn" class="btn-mode" onclick="toggleMode()">RANKINIS VALDYMAS</button>
        <button class="btn-map" onclick="setMap()">KEISTI ŽEMĖLAPĮ</button>
    </div>
</div>

<div class="bottom-banner">
    NETSTA AZIMUT POINT
</div>

<script>
var myPos = [54.6872, 25.2797];
var sectorLines = [];
var isManual = false;
var currentMap = 'google';

var map = L.map('map', { zoomControl: false }).setView(myPos, 18);

var layers = {
    esri: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }),
    google: L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 21 })
};

layers.google.addTo(map);

var myMarker = L.circleMarker(myPos, { radius: 10, color: 'white', weight: 3, fillColor: '#007bff', fillOpacity: 1 }).addTo(map);

function setMap() {
    map.removeLayer(layers[currentMap]);
    currentMap = (currentMap === 'google') ? 'esri' : 'google';
    layers[currentMap].addTo(map);
}

function toggleMode() {
    isManual = !isManual;
    const btn = document.getElementById('mode-btn');
    const txt = document.getElementById('mode-text');

    if (isManual) {
        btn.innerHTML = "SEKTI MANE (GPS)";
        btn.style.background = "#007bff";
        txt.innerHTML = "RANKINIS REŽIMAS";
    } else {
        btn.innerHTML = "RANKINIS VALDYMAS";
        btn.style.background = "#f39c12";
        txt.innerHTML = "GPS REŽIMAS";
    }
}

map.on('click', function(e) {
    if (isManual) {
        myPos = [e.latlng.lat, e.latlng.lng];
        myMarker.setLatLng(myPos);
        if (sectorLines.length > 0) updateSectors();
    }
});

function updateSectors() {
    sectorLines.forEach(l => map.removeLayer(l));
    sectorLines = [];
    const colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44'];

    [1, 2, 3, 4].forEach(i => {
        let val = document.getElementById('az' + i).value;
        if (val !== "") {
            let angle = parseFloat(val);
            let endPoint = calculateEndPoint(myPos[0], myPos[1], angle, 400);
            let line = L.polyline([myPos, endPoint], {
                color: colors[i - 1],
                weight: 6,
                opacity: 0.8
            }).addTo(map);
            line.bindTooltip(angle + "°", { permanent: true, direction: 'end' });
            sectorLines.push(line);
        }
    });
}

function calculateEndPoint(lat, lon, angle, dist) {
    const R = 6371000;
    const ad = dist / R;
    const la1 = lat * Math.PI / 180;
    const lo1 = lon * Math.PI / 180;
    const br = angle * Math.PI / 180;
    const la2 = Math.asin(Math.sin(la1) * Math.cos(ad) + Math.cos(la1) * Math.sin(ad) * Math.cos(br));
    const lo2 = lo1 + Math.atan2(
        Math.sin(br) * Math.sin(ad) * Math.cos(la1),
        Math.cos(ad) - Math.sin(la1) * Math.sin(la2)
    );
    return [la2 * 180 / Math.PI, lo2 * 180 / Math.PI];
}

navigator.geolocation.watchPosition(function(pos) {
    document.getElementById('gps-status').classList.add('gps-active');
    if (!isManual) {
        myPos = [pos.coords.latitude, pos.coords.longitude];
        myMarker.setLatLng(myPos);
        map.setView(myPos, map.getZoom());
        if (sectorLines.length > 0) updateSectors();
    }
}, function() {
    document.getElementById('gps-status').classList.remove('gps-active');
}, { enableHighAccuracy: true });

window.addEventListener("deviceorientation", function(e) {
    let heading;
    if (e.webkitCompassHeading) {
        heading = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
        heading = 360 - e.alpha;
    }
    if (heading !== undefined) {
        document.getElementById("current-deg").innerHTML = Math.round(heading) + "°";
    }
});
</script>

</body>
</html>
